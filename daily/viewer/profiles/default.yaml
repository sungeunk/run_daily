# Display profile: controls row order and matching for the Excel-paste tab.
#
# Each row matches one perf point by (model, precision, exec_mode) exactly,
# plus in_spec / out_spec which accept these values:
#   'short'  -> token_count > 0 and < 100
#   'long'   -> token_count >= 100
#   '0'      -> token_count == 0 (exact)
#   '*'      -> any value (token-agnostic, used for SD/LCM pipelines)
#   '<int>'  -> exact numeric match (e.g. '256', '802')
#
# If a row matches nothing in the selected run, the Excel paste shows a blank
# cell, preserving the layout. Perf rows in the run that don't match any
# display_row are appended after the fixed block under "Extra".

profile: default
description: "Standard LLM daily row order. Mirrors the historical FIXED_ROW_ORDER."

rows:
  # Resnet50 (benchmark_app)
  - {model: Resnet50,                precision: INT8,                 in_spec: '0',   out_spec: '0',   exec_mode: 'batch:1'}
  - {model: Resnet50,                precision: INT8,                 in_spec: '0',   out_spec: '0',   exec_mode: 'batch:64'}

  # gemma-2-9b-it
  - {model: gemma-2-9b-it,           precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: gemma-2-9b-it,           precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: gemma-2-9b-it,           precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: gemma-2-9b-it,           precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

