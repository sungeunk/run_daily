# Display profile: controls row order and matching for the Excel-paste tab.
#
# Each row matches one perf point by (model, precision, exec_mode) exactly,
# plus in_spec / out_spec which accept these values:
#   'short'  -> token_count > 0 and < 100
#   'long'   -> token_count >= 100
#   '0'      -> token_count == 0 (exact)
#   '*'      -> any value (token-agnostic, used for SD/LCM pipelines)
#   '<int>'  -> exact numeric match (e.g. '256', '802')
#
# If a row matches nothing in the selected run, the Excel paste shows a blank
# cell, preserving the layout. Perf rows in the run that don't match any
# display_row are appended after the fixed block under "Extra".

profile: default
description: "Standard LLM daily row order. Mirrors the historical FIXED_ROW_ORDER."

rows:
  # baichuan2-7b-chat
  - {model: baichuan2-7b-chat,       precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: baichuan2-7b-chat,       precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: baichuan2-7b-chat,       precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: baichuan2-7b-chat,       precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # chatglm3-6b
  - {model: chatglm3-6b,             precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: chatglm3-6b,             precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: chatglm3-6b,             precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: chatglm3-6b,             precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # glm-4-9b-chat-hf
  - {model: glm-4-9b-chat-hf,        precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: glm-4-9b-chat-hf,        precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: glm-4-9b-chat-hf,        precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: glm-4-9b-chat-hf,        precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # gemma-7b-it
  - {model: gemma-7b-it,             precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: gemma-7b-it,             precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: gemma-7b-it,             precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: gemma-7b-it,             precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # llama-2-7b-chat-hf
  - {model: llama-2-7b-chat-hf,      precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: llama-2-7b-chat-hf,      precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: llama-2-7b-chat-hf,      precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: llama-2-7b-chat-hf,      precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

