  - {model: mistral-7b-instruct-v0.2, precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # phi-3-mini-4k-instruct
  - {model: phi-3-mini-4k-instruct,  precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: phi-3-mini-4k-instruct,  precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: phi-3-mini-4k-instruct,  precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: phi-3-mini-4k-instruct,  precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # phi-3.5-mini-instruct
  - {model: phi-3.5-mini-instruct,   precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: phi-3.5-mini-instruct,   precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: phi-3.5-mini-instruct,   precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: phi-3.5-mini-instruct,   precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # phi-3.5-vision-instruct (uses exact token counts)
  - {model: phi-3.5-vision-instruct, precision: OV_FP16-4BIT_DEFAULT, in_spec: '802',  out_spec: '256', exec_mode: '1st'}
  - {model: phi-3.5-vision-instruct, precision: OV_FP16-4BIT_DEFAULT, in_spec: '802',  out_spec: '256', exec_mode: '2nd'}
  - {model: phi-3.5-vision-instruct, precision: OV_FP16-4BIT_DEFAULT, in_spec: '1032', out_spec: '256', exec_mode: '1st'}
  - {model: phi-3.5-vision-instruct, precision: OV_FP16-4BIT_DEFAULT, in_spec: '1032', out_spec: '256', exec_mode: '2nd'}

  # qwen2-7b-instruct
  - {model: qwen2-7b-instruct,       precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: qwen2-7b-instruct,       precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: qwen2-7b-instruct,       precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: qwen2-7b-instruct,       precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # qwen2.5-7b-instruct
  - {model: qwen2.5-7b-instruct,     precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: qwen2.5-7b-instruct,     precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: qwen2.5-7b-instruct,     precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: qwen2.5-7b-instruct,     precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # minicpm-v-2_6 (long only)
  - {model: minicpm-v-2_6,           precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: minicpm-v-2_6,           precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # whisper-large-v3 (out_token categorises audio clip length)
  - {model: whisper-large-v3,        precision: OV_FP16-4BIT_DEFAULT, in_spec: '0',   out_spec: short, exec_mode: pipeline}
  - {model: whisper-large-v3,        precision: OV_FP16-4BIT_DEFAULT, in_spec: '0',   out_spec: long,  exec_mode: pipeline}

  # Resnet50 (benchmark_app)
  - {model: Resnet50,                precision: INT8,                  in_spec: '0',   out_spec: '0',   exec_mode: 'batch:1'}
  - {model: Resnet50,                precision: INT8,                  in_spec: '0',   out_spec: '0',   exec_mode: 'batch:64'}

  # Stable Diffusion family (token-agnostic; '*' matches any in/out)
  - {model: stable-diffusion-v1-5,   precision: FP16,                  in_spec: '*',   out_spec: '*',   exec_mode: pipeline}
  - {model: stable-diffusion-v2-1,   precision: FP16,                  in_spec: '*',   out_spec: '*',   exec_mode: pipeline}
