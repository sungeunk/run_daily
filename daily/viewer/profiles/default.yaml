  - {model: llama-3.1-8b-instruct,   precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: llama-3.1-8b-instruct,   precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
  - {model: llama-3.1-8b-instruct,   precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '1st'}
  - {model: llama-3.1-8b-instruct,   precision: OV_FP16-4BIT_DEFAULT, in_spec: long,  out_spec: '256', exec_mode: '2nd'}

  # minicpm-1b-sft
  - {model: minicpm-1b-sft,          precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '1st'}
  - {model: minicpm-1b-sft,          precision: OV_FP16-4BIT_DEFAULT, in_spec: short, out_spec: '256', exec_mode: '2nd'}
