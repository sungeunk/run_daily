[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Keep the daily suite deterministic: same case order, no fail-fast surprises.
addopts =
    -ra
    --strict-markers
    --tb=short

markers =
    llm: LLM benchmark tests
    slow: expensive tests that should not run in smoke mode
